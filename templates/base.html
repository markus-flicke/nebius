<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Tool as a Service{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{{ url_for('index') }}">⚙ Tool&nbsp;as&nbsp;a&nbsp;Service</a>
    <nav>
      <a href="{{ url_for('index') }}">Tools</a>
      <a class="btn" href="{{ url_for('new_tool_form') }}">+ Add a tool</a>
    </nav>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <span class="built-with">Built with <strong>Nebius</strong></span>
  </footer>
</body>
</html>
